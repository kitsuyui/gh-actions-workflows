pre-commit:
  commands:
    actionlint:
      run: >
        for name in $(env | sed -n 's/^\(GIT_[A-Za-z0-9_]*\)=.*/\1/p'); do unset "$name"; done;
        actionlint
    typos:
      run: >
        for name in $(env | sed -n 's/^\(GIT_[A-Za-z0-9_]*\)=.*/\1/p'); do unset "$name"; done;
        typos

