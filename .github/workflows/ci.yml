name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    # Keep this repository dogfooding the reusable workflow at the same commit.
    # A pinned self-reference creates a Renovate digest update loop after every merge.
    uses: ./.github/workflows/actionlint.yml

  spellcheck:
    # Keep this repository dogfooding the reusable workflow at the same commit.
    # A pinned self-reference creates a Renovate digest update loop after every merge.
    uses: ./.github/workflows/spellcheck.yml
