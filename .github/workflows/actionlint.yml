name: Reusable actionlint

on:
  workflow_call:
    inputs:
      files:
        description: Files or globs passed to actionlint.
        required: false
        type: string
        default: ".github/workflows/*.yml"
      actionlint-version:
        description: actionlint version tag.
        required: false
        type: string
        default: "v1.7.12"
      shellcheck:
        description: Set to disabled to run actionlint with -shellcheck=.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Run actionlint
        env:
          ACTIONLINT_FILES: ${{ inputs.files }}
          ACTIONLINT_SHELLCHECK: ${{ inputs.shellcheck }}
          ACTIONLINT_VERSION: ${{ inputs.actionlint-version }}
        run: |
          set -eu

          if ! printf '%s' "$ACTIONLINT_VERSION" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::actionlint-version must be an actionlint release tag like v1.7.12"
            exit 2
          fi

          shellcheck_arg=()
          case "$ACTIONLINT_SHELLCHECK" in
            "")
              ;;
            "disabled")
              shellcheck_arg=(-shellcheck=)
              ;;
            *)
              echo "::error::shellcheck must be empty or disabled"
              exit 2
              ;;
          esac

          # ACTIONLINT_FILES is intentionally unquoted so existing caller globs keep expanding.
          # shellcheck disable=SC2086
          go run "github.com/rhysd/actionlint/cmd/actionlint@$ACTIONLINT_VERSION" "${shellcheck_arg[@]}" -- $ACTIONLINT_FILES
