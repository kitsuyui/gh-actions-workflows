name: Reusable actionlint

on:
  workflow_call:
    inputs:
      files:
        description: >-
          Shell glob pattern(s) passed to actionlint. The value is word-split
          and glob-expanded by the shell, so multiple patterns can be separated
          by spaces. Paths containing spaces are not supported.
        required: false
        type: string
        default: ".github/workflows/*.yml"
      actionlint-version:
        description: actionlint version tag.
        required: false
        type: string
        default: "v1.7.12"
      shellcheck:
        description: Legacy compatibility input. Set to disabled to run actionlint with -shellcheck=.
        required: false
        type: string
        default: ""
      shellcheck-enabled:
        description: Run ShellCheck when actionlint checks shell scripts.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26"

      - name: Run actionlint
        env:
          ACTIONLINT_FILES: ${{ inputs.files }}
          ACTIONLINT_SHELLCHECK: ${{ inputs.shellcheck }}
          ACTIONLINT_SHELLCHECK_ENABLED: ${{ inputs.shellcheck-enabled }}
          ACTIONLINT_VERSION: ${{ inputs.actionlint-version }}
        run: |
          set -eu
          set -o pipefail

          if ! printf '%s' "$ACTIONLINT_VERSION" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::actionlint-version must be an actionlint release tag like v1.7.12"
            exit 2
          fi

          shellcheck_arg=()
          case "$ACTIONLINT_SHELLCHECK" in
            "")
              case "$ACTIONLINT_SHELLCHECK_ENABLED" in
                "true")
                  ;;
                "false")
                  shellcheck_arg=(-shellcheck=)
                  ;;
                *)
                  echo "::error::shellcheck-enabled must be true or false"
                  exit 2
                  ;;
              esac
              ;;
            "disabled")
              echo "::warning::shellcheck: disabled is deprecated; use shellcheck-enabled: false"
              shellcheck_arg=(-shellcheck=)
              ;;
            *)
              echo "::error::shellcheck must be empty or disabled; use shellcheck-enabled: false to disable ShellCheck"
              exit 2
              ;;
          esac

          # ACTIONLINT_FILES is intentionally unquoted so existing caller globs keep expanding.
          # shellcheck disable=SC2086
          go run "github.com/rhysd/actionlint/cmd/actionlint@$ACTIONLINT_VERSION" "${shellcheck_arg[@]}" -- $ACTIONLINT_FILES
