name: Reusable spellcheck

on:
  workflow_call:
    inputs:
      files:
        description: Path or glob passed to typos.
        required: false
        type: string
        default: "."
      config:
        description: Optional typos config path in the caller repository.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check spelling
        uses: crate-ci/typos@master
        with:
          files: ${{ inputs.files }}
          config: ${{ inputs.config }}
