name: Reusable spellcheck

on:
  workflow_call:
    inputs:
      files:
        description: Path or glob passed to typos.
        required: false
        type: string
        default: "."
      config:
        description: Optional typos config path in the caller repository.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check spelling
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # master
        with:
          files: ${{ inputs.files }}
          config: ${{ inputs.config }}
