name: Reusable spellcheck

on:
  workflow_call:
    inputs:
      files:
        description: Path or glob passed to typos.
        required: false
        type: string
        default: "."
      config:
        description: Optional typos config path in the caller repository.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check spelling
        uses: crate-ci/typos@3bcd3b343e2ffaa3d23f8cfe7f78d0f8c2d0d0c6 # master
        with:
          files: ${{ inputs.files }}
          config: ${{ inputs.config }}
