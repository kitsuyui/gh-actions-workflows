name: Reusable gh-counter

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Artifact name for gh-counter output.
        required: false
        type: string
        default: "gh-counter-output"
      artifact-path:
        description: Artifact path for gh-counter output.
        required: false
        type: string
        default: ".gh-counter"
      retention-days:
        description: Artifact retention days.
        required: false
        type: number
        default: 30

permissions:
  contents: write
  pull-requests: write

jobs:
  gh-counter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run gh-counter
        uses: kitsuyui/gh-counter@10a1b88b49e94d920846facf0f6143b087160e2c # v1.5
        with:
          github-token: ${{ github.token }}

      - name: Upload gh-counter output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          include-hidden-files: true
          retention-days: ${{ inputs.retention-days }}
